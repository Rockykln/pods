name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: musl static build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # rust-toolchain.toml pins 1.89; install that exact channel plus the
      # musl target's rust-std component. Using @stable here would install
      # a different channel and leave us without rust-std for 1.89.
      - name: Install Rust 1.89 + musl target
        run: |
          rustup toolchain install 1.89 --component rust-src --no-self-update
          rustup target add --toolchain 1.89 x86_64-unknown-linux-musl
          rustup override set 1.89

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME#v}"
          out="podctl-${ver}-x86_64-linux-musl"
          mkdir -p "dist-stage/${out}"
          cp target/x86_64-unknown-linux-musl/release/podctl \
             target/x86_64-unknown-linux-musl/release/podctld \
             target/x86_64-unknown-linux-musl/release/podctl-tray \
             target/x86_64-unknown-linux-musl/release/podctl-popup \
             "dist-stage/${out}/"
          cp README.md INSTALL.md CHANGELOG.md NOTICE.md \
             LICENSE-MIT LICENSE-APACHE \
             "dist-stage/${out}/"
          cp -r dist/completion dist/podctl.1 dist/podctld.1 \
             dist/podctld.service dist/podctl-tray.service dist/podctl-popup.service \
             "dist-stage/${out}/"
          tar -C dist-stage -czf "${out}.tar.gz" "${out}"
          sha256sum "${out}.tar.gz" > "${out}.tar.gz.sha256"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            podctl-*.tar.gz
            podctl-*.tar.gz.sha256
          generate_release_notes: true
